[tox]
requires =
    tox>=4.2
env_list =
    py{315, 314, 313, 312, 311, 310, 315t, 314t, 313t}

[testenv]
runner = uv-venv-lock-runner
package = wheel
extras =
    cli
set_env =
    PYTHONDEVMODE = 1
commands =
    python \
      -W error \
      -W ignore:datetime.datetime.utcfromtimestamp:DeprecationWarning \
      -W ignore:datetime.datetime.utcnow:DeprecationWarning \
      -W 'ignore:Module globals; __loader__ != __spec__.loader' \
      -m coverage run \
      -m pytest {posargs:tests}
dependency_groups =
    test
